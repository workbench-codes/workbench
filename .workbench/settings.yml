project_management: github-issues
orchestrator:
  strategy:
    name: minimum-changes-expandability
    principles:
    - minimum changes
    - maximum expandability
    - do not deliver what is not needed
  escalation:
    escalate_on_blocking: true
    escalate_on_critical: true
    max_auto_answers_per_step: 50
tools:
  ck_semantic_search: false
  ck_hybrid_search: false
sync:
  paths:
  - .opencode
  - .workbench/schemas
  - README.md
  - .workbench/workflow
